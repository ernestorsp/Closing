<style>
:root{--navy:#173f5f;--teal:#1f9aaa;--bg:#f4f7fa;--line:#dce5eb;--text:#18303f;--green:#16834b;--orange:#b86b00;--red:#bd2c2c}

.inspectionHead{display:flex;align-items:center;justify-content:space-between;margin:18px 0}.inspectionHead h2{margin:4px 0}.inspectionHead strong{font-size:25px;color:var(--teal)}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}.warning{padding:12px;background:#fff0dc;border-radius:10px;color:#805000}.photoGrid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}.photoCard{background:#fff;border:1px solid var(--line);border-radius:16px;padding:16px}.photoCard.done{border-color:#70bd91;background:#f5fcf8}.photoCard.saving{border-color:#3aa9bd;background:#f1fbfd}.savingRow{display:flex;align-items:center;gap:12px}.savingRow h3,.savingRow p{margin:0}.spinner{width:25px;height:25px;border:3px solid #bce8ef;border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite;flex:0 0 auto}.spinner.small{width:18px;height:18px;border-width:2px}.inlineSave{display:flex;align-items:center;gap:9px;margin-top:12px;padding:10px 12px;border-radius:10px;font-weight:700}.inlineSave.saving{background:#eef9fb;color:#176c7a}.inlineSave.saved{background:#edf9f2;color:#237044}@keyframes spin{to{transform:rotate(360deg)}}.photoCard h3{margin:0 0 10px}.photoPreview{width:100%;height:180px;object-fit:cover;border-radius:11px;background:#edf3f6}.photoActions{display:flex;gap:8px;margin-top:10px}.camera{display:block;text-align:center;background:var(--teal);color:#fff;border-radius:10px;padding:11px;font-weight:700}.camera input{display:none}.previous{border:0;border-radius:9px;padding:9px;background:#edf3f6;color:var(--navy);font-weight:700}.historyInspection{width:100%;display:flex;align-items:center;justify-content:space-between;text-align:left;background:#fff;border:1px solid var(--line);border-radius:14px;padding:15px;color:var(--navy)}.historyInspection span{display:grid;gap:5px}.historyInspection small{font-size:13px;color:#647782}.historyLoading{display:flex;align-items:center;justify-content:center;gap:12px;padding:30px}.historyDetail{margin-top:12px}.historyPhotos{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.photoViewBtn{border:1px solid #bcd6dc;border-radius:11px;background:#f1fbfd;color:var(--navy);padding:13px;font-weight:700;text-align:left}.buttonSpinner{display:inline-block;vertical-align:middle;border-color:#ffffff66;border-top-color:#fff;margin-right:6px}.damagePanel,.finish{margin-top:24px}.choice{display:flex;gap:12px;margin:12px 0}.choice label{display:flex;align-items:center;gap:8px;flex:1;border:1px solid var(--line);border-radius:11px;padding:13px}.choice input{width:auto;margin:0}.check{display:flex;grid-template-columns:auto 1fr;align-items:start}.check input{width:auto;margin-top:2px}
