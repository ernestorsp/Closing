<script>
let TOKEN=localStorage.getItem('closing_token')||'',DATA={},CURRENT=null,DAMAGE_ANSWER='',busy=false,PHOTO_UPLOADS=new Set(),LOCATION_BUSY=false,LOCATION_CONFIRM_PENDING=false,FINISHING=false,HISTORY_ROWS=[],HISTORY_VAN_ID='',RESCUE_DELETES=new Set(),RESCUER_DELETES=new Set();
document.addEventListener('DOMContentLoaded',()=>{bind();TOKEN?loadApp():showAuth()});
function bind(){
 document.querySelectorAll('nav button').forEach(b=>b.onclick=()=>showPage(b.dataset.page));
 document.getElementById('loginForm').onsubmit=e=>{e.preventDefault();const x=form(e.target);setBusy(true);google.script.run.withSuccessHandler(r=>{TOKEN=r.token;localStorage.setItem('closing_token',TOKEN);setBusy(false);if(r.mustChange){document.getElementById('loginForm').hidden=true;document.getElementById('passwordForm').hidden=false}else loadApp()}).withFailureHandler(failBusy).login(x.email,x.password)};
 document.getElementById('passwordForm').onsubmit=e=>{e.preventDefault();const x=form(e.target);setBusy(true);google.script.run.withSuccessHandler(()=>{toast('Password updated.');setBusy(false);loadApp()}).withFailureHandler(failBusy).changePassword(TOKEN,x.currentPassword,x.newPassword)};
 document.getElementById('station').onchange=changeStation;
 document.getElementById('vanSearch').oninput=renderVans;
 document.getElementById('historySearch').oninput=renderHistoryVans;
 document.getElementById('rescueSearch').oninput=renderRescues;
 document.getElementById('vanLocation').onchange=locationChanged;
 document.getElementById('spot').onchange=saveLocation;
 document.getElementById('finishBtn').onclick=finishInspection;
 document.querySelectorAll('[name=newDamage]').forEach(x=>x.onchange=damageChoiceChanged);
 document.getElementById('damagePhoto').onchange=captureDamage;
}
function loadApp(){setBusy(true);google.script.run.withSuccessHandler(d=>{DATA=d;document.getElementById('auth').style.display='none';document.getElementById('app').hidden=false;document.getElementById('userName').textContent=d.user.name+' · '+d.user.email;document.getElementById('station').value=d.user.station;renderAll();setBusy(false)}).withFailureHandler(authFail).getAppData(TOKEN)}
function renderAll(){renderChecklist();renderVans();renderHistoryVans();renderRescues()}
function renderStats(){const s=DATA.stats;document.getElementById('stats').innerHTML=[['Active vans',s.vans],['Pending',s.pending],['Completed',s.completed],['Issues',s.issues]].map(x=>'<div class="stat"><span>'+x[0]+'</span><b>'+x[1]+'</b></div>').join('')}
function renderChecklist(){const box=document.getElementById('closingChecklist');if(!box)return;const c=DATA.checklist||{},done=Number(c.inspectionsCompleted||0),total=Number(c.inspectionsTotal||0),inspectionsReady=done>=total,rescuesReady=!!c.rescuesReady;box.innerHTML='<article class="checklistItem '+(inspectionsReady?'ready':'pending')+'"><span class="checkIcon">'+(inspectionsReady?'✓':'○')+'</span><div><h3>Van inspections</h3><p>'+done+' / '+total+' completed</p></div><strong>'+(inspectionsReady?'Ready':'Pending')+'</strong></article><article class="checklistItem '+(rescuesReady?'ready':'pending')+'"><span class="checkIcon">'+(rescuesReady?'✓':'○')+'</span><div><h3>Rescues</h3><p>'+(rescuesReady?'Daily rescues saved':'Waiting for SAVE')+'</p></div><strong>'+(rescuesReady?'Ready':'Pending')+'</strong></article>'}
function stationVans(){const done=new Set(DATA.completedVanIds||[]);return DATA.vans.filter(v=>v.CurrentStation===DATA.user.station&&!done.has(String(v.VanID)))}
function renderVans(){const q=document.getElementById('vanSearch').value.toLowerCase(),vans=stationVans().filter(v=>(v.VanNumber+' '+v.VanType).toLowerCase().includes(q));document.getElementById('pendingMeta').textContent=vans.length+' pending at '+DATA.user.station;document.getElementById('vanList').innerHTML=vans.map(v=>vanCard(v,true)).join('')||empty('No pending vans at '+DATA.user.station)}
function vanCard(v,start){const active=(DATA.inProgress||[]).find(i=>String(i.VanID)===String(v.VanID)),buttons=!start?'':active?'<button class="secondary" onclick="openInspection(\''+esc(active.InspectionID)+'\')">Continue</button>':'<button class="secondary" onclick="startInspection(\''+esc(v.VanID)+'\')">Inspect</button>'+(v.CurrentStatus==='Grounded'?'<button class="groundedSkip" title="Complete grounded van without inspection" aria-label="Complete grounded van without inspection" onclick="skipGrounded(\''+esc(v.VanID)+'\',this)">✕</button>':'');return '<article class="card"><div class="vanIcon">🚐</div><div class="cardBody"><h3>'+esc(v.VanNumber)+'</h3><div class="meta">'+esc(v.VanType||'Van')+' · '+esc(v.CurrentStation||'No location')+' '+esc(v.CurrentSpot||'')+(active?' · '+esc(active.PhotoProgress||'0/6')+' completed':'')+'</div><span class="badge '+statusClass(v.CurrentStatus)+'">'+esc(v.CurrentStatus||'No status')+'</span></div>'+(buttons?'<div class="cardActions">'+buttons+'</div>':'')+'</article>'}
function renderActive(){document.getElementById('activeList').innerHTML=DATA.inProgress.map(i=>'<article class="card"><div class="vanIcon">📷</div><div class="cardBody"><h3>'+esc(i.VanNumber)+'</h3><div class="meta">Started '+fmt(i.StartedAt)+' · '+esc(i.PhotoProgress||'0/6')+'</div></div><button class="secondary" onclick="openInspection(\''+esc(i.InspectionID)+'\')">Continue</button></article>').join('')||empty('No inspection in progress.')}
function renderCompleted(){document.getElementById('completedList').innerHTML=DATA.completedToday.map(i=>'<article class="card"><div class="vanIcon">✓</div><div class="cardBody"><h3>'+esc(i.VanNumber)+'</h3><div class="meta">'+esc(i.Station)+' '+esc(i.Spot||'')+' · '+fmt(i.CompletedAt)+'</div><span class="badge '+statusClass(i.Status)+'">'+esc(i.Status)+'</span></div></article>').join('')||empty('No completed inspections today.')}
function startInspection(vanId){setBusy(true);google.script.run.withSuccessHandler(d=>{setBusy(false);renderInspection(d);showPage('inspection')}).withFailureHandler(failBusy).startInspection(TOKEN,{vanId,station:DATA.user.station})}
function skipGrounded(vanId,button){if(button.disabled)return;button.disabled=true;button.innerHTML='<span class="spinner small"></span>';google.script.run.withSuccessHandler(r=>{toast(r.message);refreshAppData()}).withFailureHandler(e=>{button.disabled=false;button.textContent='✕';toast(e.message||String(e),true)}).skipGroundedInspection(TOKEN,vanId)}
function refreshAppData(){google.script.run.withSuccessHandler(d=>{DATA=d;document.getElementById('station').value=d.user.station;renderAll()}).withFailureHandler(e=>toast(e.message||String(e),true)).getAppData(TOKEN)}
function renderRescues(){const box=document.getElementById('rescueDrivers');if(!box)return;renderDailyRescuePicker();const q=document.getElementById('rescueSearch').value.toLowerCase(),drivers=(DATA.dailyRescueDrivers||[]).filter(d=>(String(d.Driver)+' '+String(d.Station||'')).toLowerCase().includes(q));box.innerHTML=drivers.length?drivers.map(d=>rescueGroup(d)).join(''):empty((DATA.dailyRescueDrivers||[]).length?'No matching rescue drivers.':'No rescue drivers selected today.');renderRescueFinal()}
function renderRescueFinal(){const button=document.getElementById('rescueFinalBtn'),meta=document.getElementById('rescueFinalMeta');if(!button||!meta)return;const rows=DATA.rescues||[],saved=rows.filter(x=>x.Status==='Saved').length,open=rows.length-saved,station=DATA.user.station,finalized=!!DATA.rescueFinalized;button.textContent='SAVE';button.disabled=finalized||open>0||!['DJX3','DJX4'].includes(station);meta.textContent=finalized?'Today’s '+station+' rescues are closed and saved.':open?open+' open rescue'+(open===1?' must':'s must')+' be saved or deleted first.':saved?saved+' saved rescue'+(saved===1?' is':'s are')+' ready for RESCUES '+station+'.':'No rescues added. You can still close '+station+' for today.'}
function driverOptions(drivers,selected){const groups={};drivers.forEach(d=>(groups[d.Station||'Other']||(groups[d.Station||'Other']=[])).push(d));return Object.keys(groups).sort().map(station=>'<optgroup label="'+esc(station)+'">'+groups[station].map(d=>'<option value="'+esc(d.DriverID)+'" '+(String(d.DriverID)===String(selected||'')?'selected':'')+'>'+esc(d.Driver)+'</option>').join('')+'</optgroup>').join('')}
function renderDailyRescuePicker(){const select=document.getElementById('dailyRescueDriver');if(!select)return;const selected=new Set((DATA.dailyRescueDrivers||[]).map(x=>String(x.DriverID))),available=(DATA.rescueDrivers||[]).filter(x=>!selected.has(String(x.DriverID))),value=select.value;select.innerHTML='<option value="">Select driver</option>'+driverOptions(available,value);if(available.some(x=>String(x.DriverID)===String(value)))select.value=value;const button=document.getElementById('addDailyRescueDriver'),closed=!!DATA.rescueFinalized;button.textContent='+';button.disabled=closed||!available.length;select.disabled=closed}
function rescueGroup(driver){const rows=(DATA.rescues||[]).filter(r=>String(r.RescuerDriverID)===String(driver.DriverID)),saved=rows.filter(r=>r.Status==='Saved').length,open=rows.length-saved,deleting=RESCUER_DELETES.has(String(driver.AssignmentID)),closed=!!DATA.rescueFinalized,remove=!rows.length?'<button class="rescueDriverRemove" '+(deleting||closed?'disabled':'')+' onclick="removeDailyRescuer(\''+esc(driver.AssignmentID)+'\',this)" aria-label="Remove rescue driver">'+(deleting?'<span class="spinner tiny"></span>':'−')+'</button>':'';return '<section class="rescueGroup"><div class="rescueGroupHead"><div><h3>'+esc(driver.Driver)+'</h3><span>'+esc(driver.Station||'')+' · '+saved+' saved'+(open?' · '+open+' open':'')+'</span></div><div class="rescueGroupActions">'+remove+'<button class="rescueAdd" '+(closed?'disabled':'')+' onclick="addRescueRow(\''+esc(driver.DriverID)+'\',this)" aria-label="Add rescue for '+esc(driver.Driver)+'">+</button></div></div><div class="rescueRows">'+(rows.map(rescueRow).join('')||'<p class="rescueEmpty">No rescues added.</p>')+'</div></section>'}
function rescueDeleteButton(id){const deleting=RESCUE_DELETES.has(String(id)),closed=!!DATA.rescueFinalized;return '<button class="rescueRemove" '+(deleting||closed?'disabled':'')+' onclick="removeRescueRow(\''+esc(id)+'\',this)" aria-label="Delete rescue">'+(deleting?'<span class="spinner tiny"></span>':'−')+'</button>'}
function rescueRow(r){if(r.Status==='Saved')return rescueSummary(r);const options='<option value="">Select driver</option>'+driverOptions((DATA.rescueDrivers||[]).filter(d=>String(d.DriverID)!==String(r.RescuerDriverID)),r.RecipientDriverID);return '<article class="rescueRow open" data-rescue-id="'+esc(r.RescueID)+'"><div class="rescueRowTop"><strong>Open rescue</strong><span class="draftBadge">Draft</span>'+rescueDeleteButton(r.RescueID)+'</div><div class="rescueFields"><label>Driver<select name="recipientDriverId">'+options+'</select></label><label>Stops<input name="stops" type="number" min="1" inputmode="numeric" value="'+esc(r.Stops??'')+'"></label><label>Packages<input name="packages" type="number" min="1" inputmode="numeric" value="'+esc(r.Packages??'')+'"></label><label>Affects<select name="affects"><option value="">Select</option><option '+(r.Affects==='Yes'?'selected':'')+'>Yes</option><option '+(r.Affects==='No'?'selected':'')+'>No</option></select></label><label class="rescueNotes">Notes <span>(optional)</span><input name="notes" value="'+esc(r.Notes||'')+'"></label></div><button class="rescueSaveBtn" onclick="saveRescueRow(this.closest(\'.rescueRow\'),this)">Save rescue</button></article>'}
function rescueSummary(r){return '<article class="rescueSummary"><div class="rescueSummaryMain"><div><span class="savedBadge">✓ Saved</span><h4>'+esc(r.RecipientDriver)+'</h4></div>'+rescueDeleteButton(r.RescueID)+'</div><div class="rescueSummaryStats"><span><b>'+esc(r.Stops)+'</b> stops</span><span><b>'+esc(r.Packages)+'</b> packages</span><span>Affects: <b>'+esc(r.Affects)+'</b></span></div>'+(r.Notes?'<p>'+esc(r.Notes)+'</p>':'')+'</article>'}
function setRescueData(d){DATA.rescueDrivers=d.drivers;DATA.dailyRescueDrivers=d.dailyDrivers;DATA.rescues=d.rescues;renderRescues()}
function addDailyRescuer(button){const select=document.getElementById('dailyRescueDriver'),id=select.value;if(!id)return toast('Select a rescue driver.',true);button.disabled=true;button.innerHTML='<span class="spinner small"></span>';google.script.run.withSuccessHandler(setRescueData).withFailureHandler(e=>{button.disabled=false;button.textContent='+';toast(e.message||String(e),true)}).addDailyRescueDriver(TOKEN,id)}
function removeDailyRescuer(id,button){id=String(id);if(RESCUER_DELETES.has(id))return;RESCUER_DELETES.add(id);renderRescues();google.script.run.withSuccessHandler(d=>{RESCUER_DELETES.delete(id);setRescueData(d)}).withFailureHandler(e=>{RESCUER_DELETES.delete(id);renderRescues();toast(e.message||String(e),true)}).deleteDailyRescueDriver(TOKEN,id)}
function addRescueRow(driverId,button){if(button.disabled)return;button.disabled=true;button.innerHTML='<span class="spinner small"></span>';google.script.run.withSuccessHandler(setRescueData).withFailureHandler(e=>{button.disabled=false;button.textContent='+';toast(e.message||String(e),true)}).addRescue(TOKEN,driverId)}
function rescuePayload(row){const get=n=>row.querySelector('[name='+n+']').value;return{rescueId:row.dataset.rescueId,recipientDriverId:get('recipientDriverId'),stops:get('stops'),packages:get('packages'),affects:get('affects'),notes:get('notes')}}
function saveRescueRow(row,button){if(!row||button.disabled)return;button.disabled=true;button.innerHTML='<span class="spinner small"></span> Saving…';google.script.run.withSuccessHandler(r=>{const i=(DATA.rescues||[]).findIndex(x=>String(x.RescueID)===String(r.rescue.RescueID));if(i>=0)DATA.rescues[i]=r.rescue;renderRescues();toast('Rescue saved.')}).withFailureHandler(e=>{button.disabled=false;button.textContent='Save rescue';toast(e.message||String(e),true)}).updateRescue(TOKEN,rescuePayload(row))}
function removeRescueRow(id,button){id=String(id);if(RESCUE_DELETES.has(id))return;RESCUE_DELETES.add(id);renderRescues();google.script.run.withSuccessHandler(d=>{RESCUE_DELETES.delete(id);setRescueData(d)}).withFailureHandler(e=>{RESCUE_DELETES.delete(id);renderRescues();toast(e.message||String(e),true)}).deleteRescue(TOKEN,id)}
function finalizeRescues(button){if(button.disabled)return;button.disabled=true;button.innerHTML='<span class="spinner small buttonSpinner"></span> Saving final…';google.script.run.withSuccessHandler(r=>{DATA.rescueFinalized=true;renderRescues();toast(r.message)}).withFailureHandler(e=>{renderRescueFinal();toast(e.message||String(e),true)}).finalizeDailyRescues(TOKEN)}
function openInspection(id){setBusy(true);google.script.run.withSuccessHandler(d=>{setBusy(false);renderInspection(d);showPage('inspection')}).withFailureHandler(failBusy).getInspection(TOKEN,id)}
function renderInspection(d){const same=CURRENT&&String(CURRENT.inspection.InspectionID)===String(d.inspection.InspectionID);if(!same)DAMAGE_ANSWER=d.damages.length?'Yes':'';if(d.damages.length)DAMAGE_ANSWER='Yes';CURRENT=d;LOCATION_CONFIRM_PENDING=false;document.getElementById('transferWarning').hidden=true;const i=d.inspection,done=new Map(d.photos.map(p=>[p.Part,p]));document.getElementById('inspectionVan').textContent=i.VanNumber;document.getElementById('progress').textContent=d.photos.length+'/6'+(PHOTO_UPLOADS.size?' · '+PHOTO_UPLOADS.size+' saving…':'');document.getElementById('vanLocation').value=i.Station;const statusEl=document.getElementById('vanStatus'),notesEl=document.getElementById('inspectionNotes'),draftStatus=statusEl.value,draftNotes=notesEl.value;statusEl.value=same?draftStatus:(i.Status||'Operational');notesEl.value=same?draftNotes:(i.Notes||'');renderSpotOptions(d.spots,i.Spot);showLocationWarning();document.getElementById('photoGrid').innerHTML=d.requiredParts.map(part=>photoCard(part,done.get(part))).join('');document.querySelectorAll('[name=newDamage]').forEach(x=>x.checked=x.value===DAMAGE_ANSWER);document.getElementById('damageForm').hidden=DAMAGE_ANSWER!=='Yes';document.getElementById('damageList').innerHTML=d.damages.map(x=>'<article class="card"><div class="cardBody"><h3>✓ '+esc(x.Part)+'</h3><div class="meta">'+esc(x.Severity)+' · '+esc(x.Description)+'</div></div></article>').join('');updateTransferMode();updateFinishState()}
function photoCard(part,p){if(p)return '<article class="photoCard done"><h3>✓ '+esc(part)+'</h3><p class="meta">Photo captured '+fmt(p.CapturedAt)+'</p><button class="previous" onclick="previousPhoto(\''+esc(part)+'\')">View previous photo</button></article>';if(PHOTO_UPLOADS.has(part))return '<article class="photoCard saving"><div class="savingRow"><span class="spinner"></span><div><h3>'+esc(part)+'</h3><p class="meta">Saving photo… You can continue.</p></div></div></article>';const id='p_'+part.replace(/\W/g,'_');return '<article class="photoCard" id="'+id+'"><h3>'+esc(part)+'</h3><label class="camera">📷 Take photo<input type="file" accept="image/*" capture="environment" onchange="capturePhoto(\''+esc(part)+'\',this)"></label><div class="photoActions"><button class="previous" onclick="previousPhoto(\''+esc(part)+'\')">View previous photo</button></div></article>'}
function capturePhoto(part,input){const file=input.files[0];if(!file||PHOTO_UPLOADS.has(part))return;const inspectionId=CURRENT.inspection.InspectionID;PHOTO_UPLOADS.add(part);renderInspection(CURRENT);resizeImage(file,1280,.78,data=>google.script.run.withSuccessHandler(d=>{PHOTO_UPLOADS.delete(part);if(CURRENT&&String(CURRENT.inspection.InspectionID)===String(inspectionId)){renderInspection(d.photos.length>=CURRENT.photos.length?d:CURRENT)}toast(part+' photo saved.')}).withFailureHandler(e=>{PHOTO_UPLOADS.delete(part);if(CURRENT&&String(CURRENT.inspection.InspectionID)===String(inspectionId))renderInspection(CURRENT);toast(e.message||String(e),true)}).saveInspectionPhoto(TOKEN,{inspectionId,part,image:data}))}

function damageChoiceChanged(e){DAMAGE_ANSWER=e.target.value;document.getElementById('damageForm').hidden=DAMAGE_ANSWER!=='Yes';updateFinishState()}

function captureDamage(){const input=document.getElementById('damagePhoto'),file=input.files[0],part=document.getElementById('damagePart').value,description=document.getElementById('damageDescription').value.trim(),severity=document.getElementById('damageSeverity').value;if(!file)return;if(!description){input.value='';return toast('Describe the new damage first.',true)}setBusy(true);resizeImage(file,1280,.8,data=>google.script.run.withSuccessHandler(d=>{setBusy(false);document.getElementById('damageDescription').value='';input.value='';renderInspection(d);toast('New damage saved.')}).withFailureHandler(failBusy).saveDamageReport(TOKEN,{inspectionId:CURRENT.inspection.InspectionID,part,description,severity,image:data}))}

function isTransferMode(){return!!CURRENT&&String(document.getElementById('vanLocation').value)!==String(CURRENT.inspection.WorkingStation||DATA.user.station)}
function updateTransferMode(){const transfer=isTransferMode();document.getElementById('photoSectionTitle').hidden=transfer;document.getElementById('photoGrid').hidden=transfer;document.getElementById('damagePanel').hidden=transfer;document.getElementById('finishOptions').hidden=transfer;document.getElementById('progress').hidden=transfer}
function updateFinishState(){if(!CURRENT)return;const station=document.getElementById('vanLocation').value,transfer=isTransferMode(),located=!!station&&(transfer||station==='SHOP'||!!document.getElementById('spot').value),complete=transfer?!FINISHING&&!LOCATION_BUSY&&!LOCATION_CONFIRM_PENDING&&located:!FINISHING&&!LOCATION_BUSY&&PHOTO_UPLOADS.size===0&&CURRENT.photos.length===6&&located&&!!DAMAGE_ANSWER&&(DAMAGE_ANSWER==='No'||CURRENT.damages.length>0);document.getElementById('finishBtn').disabled=!complete}
function resizeImage(file,max,quality,done){const img=new Image(),url=URL.createObjectURL(file);img.onload=()=>{let w=img.width,h=img.height;if(Math.max(w,h)>max){const r=max/Math.max(w,h);w=Math.round(w*r);h=Math.round(h*r)}const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);URL.revokeObjectURL(url);done(c.toDataURL('image/jpeg',quality))};img.src=url}
function previousPhoto(part){setBusy(true);google.script.run.withSuccessHandler(r=>{setBusy(false);if(!r.found)return toast('No previous photo for this position.');document.getElementById('photoModalTitle').textContent='Previous '+part+' photo';document.getElementById('previousImage').src=r.image;document.getElementById('previousMeta').textContent=fmt(r.capturedAt)+' · '+r.assessment+(r.notes?' · '+r.notes:'');document.getElementById('photoModal').hidden=false}).withFailureHandler(failBusy).getPreviousPhoto(TOKEN,CURRENT.inspection.InspectionID,part)}
function locationChanged(){const station=document.getElementById('vanLocation').value;showLocationWarning();updateTransferMode();if(isTransferMode()){LOCATION_CONFIRM_PENDING=true;renderSpotOptions([],'');showTransferWarning(station);updateFinishState();return}LOCATION_CONFIRM_PENDING=false;document.getElementById('transferWarning').hidden=true;renderSpotOptions([],'');setLocationBusy(true,'Loading available spots…');google.script.run.withSuccessHandler(spots=>{setLocationBusy(false);renderSpotOptions(spots,'');showLocationWarning();updateFinishState()}).withFailureHandler(e=>{setLocationBusy(false);toast(e.message||String(e),true)}).getAvailableSpots(TOKEN,station,CURRENT.inspection.VanID)}
function showTransferWarning(station){const last=CURRENT.lastInspection||{},when=last.CompletedAt?fmtFull(last.CompletedAt):'No previous inspection date',person=last.UserName||last.UserEmail||'Unknown inspector',warning=document.getElementById('transferWarning');document.getElementById('transferWarningText').textContent='Last inspection: '+when+' by '+person+'. Move this van from '+CURRENT.inspection.WorkingStation+' to '+station+' without a full inspection. Are you sure?';warning.hidden=false}
function confirmTransferLocation(){if(!LOCATION_CONFIRM_PENDING)return;LOCATION_CONFIRM_PENDING=false;document.getElementById('transferWarning').hidden=true;saveLocation()}
function cancelTransferLocation(){LOCATION_CONFIRM_PENDING=false;document.getElementById('transferWarning').hidden=true;document.getElementById('vanLocation').value=CURRENT.inspection.Station;renderSpotOptions(CURRENT.spots||[],CURRENT.inspection.Spot);showLocationWarning();updateTransferMode();updateFinishState()}
function renderSpotOptions(spots,selected){const station=document.getElementById('vanLocation').value,wrap=document.getElementById('spotWrap'),select=document.getElementById('spot');wrap.style.display=station==='SHOP'||isTransferMode()?'none':'grid';select.innerHTML='<option value="">Select available spot</option>'+spots.map(s=>'<option value="'+esc(s.SpotID)+'" '+(s.Spot===selected?'selected':'')+'>'+esc(s.Spot)+'</option>').join('')}
function setLocationBusy(v,message){LOCATION_BUSY=v;document.getElementById('vanLocation').disabled=v;document.getElementById('spot').disabled=v;const el=document.getElementById('locationSaveState');el.hidden=!v;el.className='inlineSave saving';el.innerHTML=v?'<span class="spinner small"></span>'+esc(message||'Saving…'):'';updateFinishState()}
function showLocationSaved(){const el=document.getElementById('locationSaveState');el.hidden=false;el.className='inlineSave saved';el.textContent='✓ Location saved';setTimeout(()=>{if(!LOCATION_BUSY)el.hidden=true},1800)}
function saveLocation(){const station=document.getElementById('vanLocation').value,spotId=isTransferMode()||station==='SHOP'?'':document.getElementById('spot').value;if(!isTransferMode()&&station!=='SHOP'&&!spotId)return;const inspectionId=CURRENT.inspection.InspectionID;setLocationBusy(true,'Saving location…');google.script.run.withSuccessHandler(d=>{setLocationBusy(false);if(CURRENT&&String(CURRENT.inspection.InspectionID)===String(inspectionId))renderInspection(d);showLocationSaved();toast('Location saved.')}).withFailureHandler(e=>{setLocationBusy(false);toast(e.message||String(e),true)}).updateInspectionLocation(TOKEN,{inspectionId,station,spotId})}
function showLocationWarning(){const i=CURRENT.inspection,newStation=document.getElementById('vanLocation').value,w=document.getElementById('locationWarning'),changed=String(i.PreviousStation||'')!==newStation;w.hidden=!changed;w.textContent=changed?'Last location was '+(i.PreviousStation||'not set')+'. New location: '+newStation+'.':''}
function finishInspection(){if(FINISHING)return;const status=document.getElementById('vanStatus').value,notes=document.getElementById('inspectionNotes').value;setFinishBusy(true);google.script.run.withSuccessHandler(r=>{toast(r.message);CURRENT=null;DAMAGE_ANSWER='';setFinishBusy(false);loadApp();showPage('home')}).withFailureHandler(e=>{setFinishBusy(false);toast(e.message||String(e),true)}).finishInspection(TOKEN,{inspectionId:CURRENT.inspection.InspectionID,status,notes,newDamageFound:DAMAGE_ANSWER})}
function setFinishBusy(v){FINISHING=v;const b=document.getElementById('finishBtn');b.disabled=v;b.innerHTML=v?'<span class="spinner small buttonSpinner"></span> Finishing inspection…':'Finish inspection';if(!v)updateFinishState()}
function changeStation(e){const next=e.target.value,old=DATA.user.station;if(next===old)return;if(!confirm('Change your working station from '+old+' to '+next+'?')){e.target.value=old;return}setBusy(true);google.script.run.withSuccessHandler(()=>{DATA.user.station=next;setBusy(false);loadApp()}).withFailureHandler(x=>{e.target.value=old;failBusy(x)}).setWorkingStation(TOKEN,next)}
function renderHistoryVans(){const q=document.getElementById('historySearch').value.toLowerCase();document.getElementById('historyVans').innerHTML=DATA.vans.filter(v=>(v.VanNumber+' '+v.VanType).toLowerCase().includes(q)).map(v=>'<article class="card"><div class="vanIcon">🚐</div><div class="cardBody"><h3>'+esc(v.VanNumber)+'</h3><div class="meta">'+esc(v.CurrentStation||'')+' '+esc(v.CurrentSpot||'')+'</div></div><button class="secondary" onclick="loadHistory(\''+esc(v.VanID)+'\')">History</button></article>').join('')}
function loadHistory(id){HISTORY_VAN_ID=id;setBusy(true);google.script.run.withSuccessHandler(rows=>{setBusy(false);HISTORY_ROWS=rows;document.getElementById('historyVans').innerHTML='';renderHistoryRows()}).withFailureHandler(failBusy).getVanHistory(TOKEN,id)}
function renderHistoryRows(){document.getElementById('historyList').innerHTML='<button class="back" onclick="backToHistoryVans()">← Back to vans</button>'+HISTORY_ROWS.map(i=>'<button class="historyInspection" onclick="openHistoryInspection(\''+esc(i.InspectionID)+'\')"><span><b>'+fmt(i.CompletedAt)+'</b><small>'+esc(i.VanNumber)+' · '+esc(i.Status)+' · '+esc(i.Station)+' '+esc(i.Spot||'')+'</small><small>Completed by '+esc(i.UserName||i.UserEmail||'Unknown')+'</small></span><strong>View ›</strong></button>').join('')||empty('No completed inspections.')}
function backToHistoryVans(){HISTORY_ROWS=[];HISTORY_VAN_ID='';document.getElementById('historyList').innerHTML='';renderHistoryVans()}
function openHistoryInspection(id){document.getElementById('historyList').innerHTML='<div class="historyLoading"><span class="spinner"></span> Loading inspection…</div>';google.script.run.withSuccessHandler(renderHistoryDetail).withFailureHandler(e=>{renderHistoryRows();toast(e.message||String(e),true)}).getCompletedInspection(TOKEN,id)}
function renderHistoryDetail(d){const photos=new Map(d.photos.map(p=>[p.Part,p]));document.getElementById('historyList').innerHTML='<button class="back" onclick="renderHistoryRows()">← Back to inspections</button><article class="panel historyDetail"><h2>'+esc(d.inspection.VanNumber)+'</h2><div class="meta">'+fmt(d.inspection.CompletedAt)+' · '+esc(d.inspection.Station)+' '+esc(d.inspection.Spot||'')+' · '+esc(d.inspection.Status)+'</div><p><b>Completed by:</b> '+esc(d.inspection.UserName||d.inspection.UserEmail||'Unknown')+'</p><p>'+esc(d.inspection.Notes||'No notes')+'</p><h3>Inspection photos</h3><div class="historyPhotos">'+d.requiredParts.map(part=>{const p=photos.get(part);return p?'<button class="photoViewBtn" onclick="historyPhoto(\''+esc(d.inspection.InspectionID)+'\',\''+esc(p.PhotoID)+'\',\''+esc(part)+'\')">📷 '+esc(part)+'</button>':'<button class="photoViewBtn" disabled>'+esc(part)+' · Missing</button>'}).join('')+'</div></article>'}
function historyPhoto(inspectionId,photoId,part){document.getElementById('photoModalTitle').textContent=part;document.getElementById('previousMeta').textContent='Loading photo…';document.getElementById('previousImage').removeAttribute('src');document.getElementById('photoModal').hidden=false;google.script.run.withSuccessHandler(r=>{document.getElementById('previousImage').src=r.image;document.getElementById('previousMeta').textContent=fmt(r.capturedAt)+' · '+(r.assessment||'Inspection photo')}).withFailureHandler(e=>{closeModal();toast(e.message||String(e),true)}).getInspectionPhoto(TOKEN,inspectionId,photoId)}
function showPage(id){document.querySelectorAll('.page').forEach(x=>x.classList.toggle('active',x.id===id));document.querySelectorAll('nav button').forEach(x=>x.classList.toggle('active',x.dataset.page===id));if(id==='history'){document.getElementById('historyList').innerHTML='';renderHistoryVans()}}
function closeModal(e){if(e&&e.target!==document.getElementById('photoModal'))return;document.getElementById('photoModal').hidden=true;document.getElementById('previousImage').src=''}
function doLogout(){const t=TOKEN;TOKEN='';localStorage.removeItem('closing_token');google.script.run.logout(t);document.getElementById('app').hidden=true;showAuth()}
function showAuth(){document.getElementById('auth').style.display='grid';document.getElementById('app').hidden=true}
function authFail(e){setBusy(false);if(String(e.message||e).includes('AUTH_REQUIRED')){TOKEN='';localStorage.removeItem('closing_token');showAuth()}toast(e.message||String(e),true)}
function failBusy(e){setBusy(false);toast(e.message||String(e),true)}
function setBusy(v){busy=v;document.querySelectorAll('button,input,select,textarea').forEach(x=>x.disabled=v)}
function toast(m,error=false){const x=document.getElementById('toast');x.textContent=m;x.className=error?'error':'';x.style.display='block';setTimeout(()=>x.style.display='none',4000)}
function form(f){return Object.fromEntries(new FormData(f).entries())}function fmt(v){if(!v)return'';const d=new Date(v);return isNaN(d)?String(v):d.toLocaleString()}function fmtFull(v){const d=new Date(v);return isNaN(d)?String(v):d.toLocaleString(undefined,{weekday:'long',year:'numeric',month:'long',day:'numeric',hour:'numeric',minute:'2-digit'})}function statusClass(s){return s==='Operational'?'good':s==='Grounded'?'bad':'warn'}function empty(t){return '<div class="panel meta">'+esc(t)+'</div>'}function esc(v){return String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}
</script>
